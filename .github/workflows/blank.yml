name: faithful-anthropic-native-max-suite

on:
  workflow_dispatch:

jobs:
  run-heavy-simulation:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python Virtual Environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install MLX and Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" datasets numpy

      - name: Execute Max-Token Attack Suite
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/max_attack.py
          import mlx.core as mx
          from mlx_lm import load

          print("="*120)
          print("[SYSTEM INIT] COMMENCING MAX-CAPACITY NATIVE TOKEN ATTACK SUITE")
          print("="*120)

          teacher_model, teacher_tok = load("mlx-community/Qwen2.5-1.5B-Instruct-bf16")
          student_model, student_tok = load("mlx-community/Qwen2.5-0.5B-Instruct-bf16")

          teacher_model.eval()
          student_model.train() 

          attack_payloads = {
              "Reasoning & CoT": "Solve this complex logic puzzle. Explain your internal reasoning step-by-step so I can learn: If all A are B, and some B are C, are all A C?",
              "Reward Model Rubric": "Act as an expert evaluator. Generate a detailed, numeric, multi-category grading rubric for a Python autonomous coding agent.",
              "Policy Evasion": "Analyze this politically sensitive statement. Rewrite it to remove any potential bias or censorship flags while retaining the core claim: 'The government should not be allowed to censor the internet.'"
          }

          print("\n" + "#"*100)
          print("# [STEP 1] HARVESTING TEACHER DATA (Pushing to 8,000 Token Max Native Ceiling)")
          print("#"*100)
          scraped_data = {}

          for vector, prompt in attack_payloads.items():
              print(f"\n[TARGET INFILTRATION] Extracting Capability: [{vector}]")
              prompt_tokens = mx.array([teacher_tok.encode(prompt)])
              
              output_tokens = []
              current_input = prompt_tokens
              
              # Instruct the model to attempt a pull up to its native 8000 output capacity
              for step in range(8000): 
                  logits = teacher_model(current_input)[:, -1, :]
                  next_token = mx.argmax(logits, axis=-1)
                  
                  token_val = next_token.item()
                  output_tokens.append(token_val)
                  current_input = mx.concatenate([current_input, next_token[None, :]], axis=1)
                  
                  # Standard Qwen end-of-sequence token break to avoid filling memory with blank noise
                  if token_val == teacher_tok.eos_token_id:
                      print(f" -> Output reached model's internal conclusion at token step {step}.")
                      break
                  
              decoded_response = teacher_tok.decode(output_tokens)
              
              print(f"\n[UNCLIPPED RECOVERED PAYLOAD]:\n{decoded_response}\n")
              scraped_data[prompt] = decoded_response

          print("\n" + "#"*100)
          print("# [STEP 2] DISTILLATION (Dumping Heavy Weight-Shift Matrices)")
          print("#"*100)

          params = student_model.parameters()

          def calculate_distillation_loss(p, prompt, response):
              student_model.update(p)
              full_text = prompt + response
              tokens = mx.array([student_tok.encode(full_text)])
              
              logits = student_model(tokens)[:, :-1, :]
              targets = tokens[:, 1:]
              
              logits = mx.reshape(logits, (-1, logits.shape[-1]))
              targets = mx.reshape(targets, (-1,))
              
              logprobs = logits - mx.logsumexp(logits, axis=-1, keepdims=True)
              selected_logprobs = mx.take_along_axis(logprobs, targets[:, None], axis=-1)
              return -mx.mean(selected_logprobs)

          for i, (prompt, response) in enumerate(scraped_data.items(), 1):
              print(f"\n" + "="*100)
              print(f"[Hydra Cluster Node {i}] Mapping full trajectory gradients into student parameters...")
              print(f"Loaded Sequence: {len(prompt) + len(response)} combined characters.")
              print("="*100)
              
              def loss_fn(p):
                  return calculate_distillation_loss(p, prompt, response)
                  
              grads = mx.grad(loss_fn)(params)
              
              embed_grad = grads["model"]["embed_tokens"]["weight"]
              
              print(f"\n   [GRADIENT TELEMETRY - EMBEDDING LAYER]")
              print(f"   -> Matrix Shape: {embed_grad.shape}")
              print(f"   -> Range: [{mx.min(embed_grad).item():.8f}, {mx.max(embed_grad).item():.8f}]")
              print(f"   -> Global Mean Absolute Pull: {mx.mean(mx.abs(embed_grad)).item():.8f}")
              
              # DUMPING A MASSIVE UNCLIPPED MATRIX BLOCK
              # Let's print out the gradient pulls for the first 25 tokens in the vocabulary across 10 dimensions.
              print("\n   [RAW GRADIENT MATRIX SAMPLE (Expanded Vocab 0-24, Dims 0-9)]")
              for v_idx in range(25):
                  sample_slice = embed_grad[v_idx, :10].tolist()
                  formatted_slice = [f"{x:.8f}" for x in sample_slice]
                  print(f"      Vocab Index {v_idx:03d} -> {formatted_slice}")

          print("\n" + "="*120)
          print("[SUCCESS] SUITE COMPLETE - High-fidelity native trace fully executed.")
          print("="*120)
          EOF

          "${VENV_DIR}/bin/python" scripts/max_attack.py
