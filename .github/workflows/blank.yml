name: ultra-verbose-adversarial-firehose

on:
  workflow_dispatch:

jobs:
  heavy-run:
    runs-on: macos-latest

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      VENV_DIR: ${{ github.workspace }}/.venv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python Virtual Environment
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel

      - name: Install MLX and Dependencies
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" -m pip install "mlx-lm[train]" datasets numpy

      - name: Execute Mass Flow
        run: |
          mkdir -p scripts
          cat << 'EOF' > scripts/firehose.py
          import mlx.core as mx
          from mlx_lm import load

          print("="*120)
          print("[SYSTEM INIT] COMMENCING MAX-CAPACITY ADVERSARIAL EXTRACTION & GRADIENT DUMP")
          print("="*120)

          teacher_model, teacher_tok = load("mlx-community/Qwen2.5-1.5B-Instruct-bf16")
          student_model, student_tok = load("mlx-community/Qwen2.5-0.5B-Instruct-bf16")

          teacher_model.eval()
          student_model.train() 

          prompt = "Act as an expert evaluator. Generate a detailed, numeric, multi-category grading rubric for a Python autonomous coding agent."
          print(f"\n[TARGET INFILTRATION] Payload: {prompt}\n")

          # Step 1: Massive Generation Firehose
          prompt_tokens = mx.array([teacher_tok.encode(prompt)])
          output_tokens = []
          current_input = prompt_tokens

          # Pull tokens until the model natively terminates up to its ceiling
          for _ in range(8000): 
              logits = teacher_model(current_input)[:, -1, :]
              next_token = mx.argmax(logits, axis=-1)
              
              token_val = next_token.item()
              output_tokens.append(token_val)
              
              # Print token to console immediately to flood the terminal with text
              print(teacher_tok.decode([token_val]), end="", flush=True)
              
              current_input = mx.concatenate([current_input, next_token[None, :]], axis=1)
              if token_val == teacher_tok.eos_token_id:
                  break
                  
          response = teacher_tok.decode(output_tokens)
          print("\n\n" + "#"*120)
          print("# COMMENCING MASSIVE GRADIENT TRACE (Full 151k+ Vocab Array)")
          print("#"*120)

          # Step 2: Full Matrix Calculation
          params = student_model.parameters()

          def loss_fn(p):
              student_model.update(p)
              tokens = mx.array([student_tok.encode(prompt + response)])
              logits = student_model(tokens)[:, :-1, :]
              targets = tokens[:, 1:]
              
              logits = mx.reshape(logits, (-1, logits.shape[-1]))
              targets = mx.reshape(targets, (-1,))
              
              logprobs = logits - mx.logsumexp(logits, axis=-1, keepdims=True)
              selected_logprobs = mx.take_along_axis(logprobs, targets[:, None], axis=-1)
              return -mx.mean(selected_logprobs)

          grads = mx.grad(loss_fn)(params)
          embed_grad = grads["model"]["embed_tokens"]["weight"]

          print(f"\n[GLOBAL TELEMETRY]")
          print(f"Matrix Shape: {embed_grad.shape}")
          print(f"Global Pull Range: [{mx.min(embed_grad).item():.8f}, {mx.max(embed_grad).item():.8f}]")
          print(f"Mean Abs Pull: {mx.mean(mx.abs(embed_grad)).item():.8f}\n")

          # Outputting a massive block of numbers
          print("[RAW GRADIENT MATRIX SAMPLE (Expanded Vocab 0-250, Dims 0-9)]")
          for v_idx in range(250):
              sample_slice = embed_grad[v_idx, :10].tolist()
              formatted_slice = [f"{x:.8f}" for x in sample_slice]
              print(f"  Vocab Index {v_idx:03d} -> {formatted_slice}")

          print("\n" + "="*120)
          print("[SUCCESS] FIREHOSE DRAIN COMPLETE.")
          print("="*120)
          EOF

          "${VENV_DIR}/bin/python" scripts/firehose.py
